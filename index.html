<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Nivel de Esfera | Vista Cenital</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0f0f1a;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      position: fixed;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    /* Overlay inicio */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 20, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .overlay-card {
      background: rgba(30, 30, 50, 0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 2rem;
      text-align: center;
      max-width: 340px;
      width: 90%;
      color: #ddd;
    }
    .overlay-card h2 {
      margin: 0.5rem 0 0.3rem;
      font-weight: 500;
    }
    .overlay-card p {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 1.5rem;
    }
    .overlay-card button {
      background: #e8833a;
      color: white;
      border: none;
      font-size: 1.2rem;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 20px rgba(232,131,58,0.4);
    }
    .overlay-card button:active {
      transform: scale(0.95);
    }
    /* HUD */
    .hud {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }
    .hud > * {
      pointer-events: auto;
    }
    #calibrate-btn {
      background: rgba(20,20,40,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ddd;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #sensor-debug {
      background: rgba(0,0,0,0.6);
      color: #8f8;
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 0.7rem;
      font-family: monospace;
      pointer-events: none;
    }
    @media (max-width: 500px) {
      .hud {
        top: 8px;
        right: 8px;
        gap: 4px;
      }
      #calibrate-btn {
        padding: 6px 12px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div id="start-overlay">
    <div class="overlay-card">
      <div style="font-size:3rem;">🔮</div>
      <h2>Nivel de Esfera</h2>
      <p>Inclina tu móvil para mover la esfera.<br>Vista cenital · Calibración automática</p>
      <button id="enable-sensors-btn">▶ Tocar para empezar</button>
      <p style="font-size:0.7rem; margin-top:1rem; color:#888;">Funciona con sensor de orientación</p>
    </div>
  </div>

  <canvas id="mainCanvas"></canvas>

  <div class="hud">
    <button id="calibrate-btn">🎯 Calibrar</button>
    <div id="sensor-debug">β 0.0 γ 0.0</div>
  </div>

  <script>
    (() => {
      // ----- DOM -----
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('start-overlay');
      const enableBtn = document.getElementById('enable-sensors-btn');
      const calibrateBtn = document.getElementById('calibrate-btn');
      const debugDisplay = document.getElementById('sensor-debug');

      // ----- ESTADO -----
      let w, h, dpr = Math.min(window.devicePixelRatio || 1, 2);
      let beta = 0, gamma = 0;            // valores crudos del sensor
      let beta0 = 0, gamma0 = 0;          // offsets de calibración
      let sensorsGranted = false;
      let useMouseSimulation = false;     // true si no hay sensor (desktop)

      // Esfera: posición normalizada (0..1) dentro del tablero rectangular
      let nx = 0.5, ny = 0.5;            // centro
      let vx = 0, vy = 0;
      const GRAVITY = 2.6;               // sensibilidad
      const FRICTION = 0.93;
      const MAX_SPEED = 0.028;
      const MARGIN = 0.04;               // margen para rebote (normalizado 0-1)

      // Partículas de rebote
      let particles = [];

      // Ratón (modo escritorio)
      let mouseX = 0.5, mouseY = 0.5, mouseActive = false;

      // ----- DETECCIÓN DE SENSORES -----
      function hasDeviceOrientation() {
        return typeof DeviceOrientationEvent !== 'undefined';
      }

      async function requestOrientationPermission() {
        if (!hasDeviceOrientation()) return false;
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            const perm = await DeviceOrientationEvent.requestPermission();
            return perm === 'granted';
          } catch (e) {
            return false;
          }
        }
        // Android u otros: siempre disponible
        return true;
      }

      function enableSensors() {
        window.addEventListener('deviceorientation', (e) => {
          if (e.beta !== null && e.gamma !== null) {
            beta = e.beta;
            gamma = e.gamma;
          }
        }, true);
        sensorsGranted = true;
        useMouseSimulation = false;
      }

      // ----- CALIBRACIÓN -----
      function calibrate() {
        beta0 = beta;
        gamma0 = gamma;
        vx = 0; vy = 0;
        // Partículas de calibración
        for (let i=0; i<25; i++) {
          particles.push({
            x: w/2, y: h/2,
            vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8 - 3,
            life: 1, decay: 0.025 + Math.random()*0.04,
            size: 2+Math.random()*5,
            color: '#7ec8f8'
          });
        }
      }

      function getCalibratedAngles() {
        let b = beta - beta0;
        let g = gamma - gamma0;
        // normalizar beta a [-180,180]
        while (b > 180) b -= 360;
        while (b < -180) b += 360;
        // gamma limitado a [-90,90]
        if (g > 90) g = 180 - g;
        if (g < -90) g = -180 - g;
        return { b, g };
      }

      // ----- SIMULACIÓN RATÓN (desktop) -----
      function setupMouseSimulation() {
        useMouseSimulation = true;
        document.addEventListener('mousemove', (e) => {
          mouseX = e.clientX / window.innerWidth;
          mouseY = e.clientY / window.innerHeight;
          mouseActive = true;
        });
        document.addEventListener('mouseleave', () => { mouseActive = false; });
        document.addEventListener('mouseenter', (e) => {
          mouseX = e.clientX / window.innerWidth;
          mouseY = e.clientY / window.innerHeight;
          mouseActive = true;
        });
      }

      function getSimulatedAngles() {
        if (!mouseActive) return { b: 0, g: 0 };
        // mouseX 0..1 -> gamma entre +25 (izquierda) y -25 (derecha)
        const simGamma = -(mouseX - 0.5) * 50;
        const simBeta = (mouseY - 0.5) * 50;
        return { b: simBeta, g: simGamma };
      }

      // ----- GEOMETRÍA VISTA CENITAL -----
      function getPlatformRect() {
        const padding = Math.min(w, h) * 0.08;
        const areaW = w - padding * 2;
        const areaH = h - padding * 2;
        // Mantener cuadrado para mejor sensación de nivel
        const side = Math.min(areaW, areaH);
        const left = (w - side) / 2;
        const top = (h - side) / 2;
        return { x: left, y: top, w: side, h: side };
      }

      function sphereCanvasCoords() {
        const r = getPlatformRect();
        const sx = r.x + nx * r.w;
        const sy = r.y + (1 - ny) * r.h;  // ny 0 = abajo (cerca)
        const radius = Math.min(r.w, r.h) * 0.065;
        return { x: sx, y: sy, r: radius };
      }

      // ----- FÍSICA -----
      function updatePhysics(dt) {
        let bAngle, gAngle;
        if (!useMouseSimulation && sensorsGranted) {
          const cal = getCalibratedAngles();
          bAngle = cal.b;
          gAngle = cal.g;
        } else if (useMouseSimulation) {
          const sim = getSimulatedAngles();
          bAngle = sim.b;
          gAngle = sim.g;
        } else {
          bAngle = 0; gAngle = 0;
        }

        // Mostrar debug
        debugDisplay.textContent = `β ${bAngle.toFixed(1)}° γ ${gAngle.toFixed(1)}°`;

        // Convertir a aceleración (radianes)
        const ax = Math.sin(gAngle * Math.PI/180) * GRAVITY;
        const ay = -Math.sin(bAngle * Math.PI/180) * GRAVITY;  // beta+ -> esfera hacia abajo

        vx += ax * dt;
        vy += ay * dt;
        vx *= FRICTION;
        vy *= FRICTION;

        const sp = Math.sqrt(vx*vx + vy*vy);
        if (sp > MAX_SPEED) {
          vx *= MAX_SPEED / sp;
          vy *= MAX_SPEED / sp;
        }

        nx += vx * dt * 60;
        ny += vy * dt * 60;

        // Rebotes en bordes (0..1 con margen)
        let bounced = false;
        if (nx < MARGIN) { nx = MARGIN; vx = Math.abs(vx)*0.5; bounced = true; }
        if (nx > 1 - MARGIN) { nx = 1 - MARGIN; vx = -Math.abs(vx)*0.5; bounced = true; }
        if (ny < MARGIN) { ny = MARGIN; vy = Math.abs(vy)*0.5; bounced = true; }
        if (ny > 1 - MARGIN) { ny = 1 - MARGIN; vy = -Math.abs(vy)*0.5; bounced = true; }

        if (bounced) {
          const sc = sphereCanvasCoords();
          for (let i=0; i<12; i++) {
            const ang = Math.random()*Math.PI*2;
            const spd = 2+Math.random()*5;
            particles.push({
              x: sc.x, y: sc.y,
              vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
              life: 1, decay: 0.03+Math.random()*0.05,
              size: 1.5+Math.random()*3.5,
              color: '#f0c080'
            });
          }
        }
      }

      function updateParticles(dt) {
        for (let i=particles.length-1; i>=0; i--) {
          const p = particles[i];
          p.x += p.vx * dt * 60;
          p.y += p.vy * dt * 60;
          p.vy += 0.12 * dt * 60;
          p.life -= p.decay * dt * 60;
          if (p.life <= 0) particles.splice(i,1);
        }
      }

      // ----- DIBUJO -----
      function drawBackground() {
        const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.7);
        grad.addColorStop(0, '#1c1c32');
        grad.addColorStop(1, '#080814');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,w,h);
      }

      function drawPlatform() {
        const r = getPlatformRect();
        // Sombra exterior
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 24;
        ctx.fillStyle = '#2a2a3a';
        ctx.beginPath();
        ctx.roundRect(r.x-4, r.y-4, r.w+8, r.h+8, 18);
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;

        // Fondo de la plataforma
        const grad = ctx.createLinearGradient(r.x, r.y, r.x+r.w, r.y+r.h);
        grad.addColorStop(0, '#3e362e');
        grad.addColorStop(0.5, '#4a4038');
        grad.addColorStop(1, '#2f2822');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(r.x, r.y, r.w, r.h, 14);
        ctx.fill();

        // Borde
        ctx.strokeStyle = 'rgba(180,160,140,0.45)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Cuadrícula
        ctx.strokeStyle = 'rgba(255,220,180,0.13)';
        ctx.lineWidth = 1;
        const steps = 8;
        for (let i=1; i<steps; i++) {
          const x = r.x + (r.w/steps)*i;
          ctx.beginPath(); ctx.moveTo(x, r.y); ctx.lineTo(x, r.y+r.h); ctx.stroke();
          const y = r.y + (r.h/steps)*i;
          ctx.beginPath(); ctx.moveTo(r.x, y); ctx.lineTo(r.x+r.w, y); ctx.stroke();
        }

        // Pequeño centro
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.arc(r.x+r.w/2, r.y+r.h/2, r.w*0.04, 0, Math.PI*2);
        ctx.fill();
      }

      function drawSphere() {
        const sc = sphereCanvasCoords();
        if (sc.r < 2) return;
        // Sombra
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.beginPath();
        ctx.ellipse(sc.x, sc.y+sc.r*0.55, sc.r*0.75, sc.r*0.2, 0, 0, Math.PI*2);
        ctx.fill();

        // Esfera
        const grad = ctx.createRadialGradient(sc.x-sc.r*0.3, sc.y-sc.r*0.35, sc.r*0.05, sc.x, sc.y, sc.r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.1, '#e0f4ff');
        grad.addColorStop(0.3, '#4da6cc');
        grad.addColorStop(0.6, '#136d8a');
        grad.addColorStop(0.85, '#083c4f');
        grad.addColorStop(1, '#021a24');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sc.x, sc.y, sc.r, 0, 2*Math.PI);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      function drawParticlesCtx() {
        for (const p of particles) {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawBubbleLevel() {
        const cx = w * 0.13, cy = h * 0.87;
        const R = Math.min(w,h)*0.065;
        const rInner = R*0.22;
        // anillo
        ctx.fillStyle = 'rgba(20,20,35,0.7)';
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, R+8, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI); ctx.stroke();
        // cruz
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.setLineDash([4,5]);
        ctx.beginPath(); ctx.moveTo(cx-R*0.7, cy); ctx.lineTo(cx+R*0.7, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy-R*0.7); ctx.lineTo(cx, cy+R*0.7); ctx.stroke();
        ctx.setLineDash([]);
        // burbuja
        let angles = useMouseSimulation ? getSimulatedAngles() : getCalibratedAngles();
        if (!sensorsGranted && !useMouseSimulation) angles = {b:0,g:0};
        const offX = (angles.g/35) * R*0.65;
        const offY = (angles.b/35) * R*0.65;
        const bx = cx + offX, by = cy + offY;
        const dist = Math.sqrt(offX*offX + offY*offY);
        const maxDist = R - rInner - 3;
        const finalX = dist > maxDist ? cx + (offX/dist)*maxDist : bx;
        const finalY = dist > maxDist ? cy + (offY/dist)*maxDist : by;
        const bGrad = ctx.createRadialGradient(finalX-rInner*0.3, finalY-rInner*0.3, rInner*0.08, finalX, finalY, rInner);
        bGrad.addColorStop(0,'#fff'); bGrad.addColorStop(0.5,'#8ed6f0'); bGrad.addColorStop(1,'#1c6080');
        ctx.fillStyle = bGrad;
        ctx.beginPath(); ctx.arc(finalX, finalY, rInner, 0, 2*Math.PI); ctx.fill();
      }

      // ----- BUCLE -----
      let lastTime = performance.now();
      function loop(now) {
        let dt = (now - lastTime)/1000;
        if (dt <= 0) dt = 0.016;
        if (dt > 0.15) dt = 0.15;
        lastTime = now;

        updatePhysics(dt);
        updateParticles(dt);

        ctx.clearRect(0,0,w,h);
        drawBackground();
        drawPlatform();
        drawParticlesCtx();
        drawSphere();
        drawBubbleLevel();

        // Indicador modo ratón
        if (useMouseSimulation) {
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.font = `${Math.min(w,h)*0.02}px system-ui`;
          ctx.textAlign = 'center';
          ctx.fillText('🖱️ Modo ratón', w/2, h*0.95);
        }

        requestAnimationFrame(loop);
      }

      // ----- RESIZE -----
      function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        dpr = Math.min(window.devicePixelRatio||1, 2);
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(1,0,0,1,0,0);
        ctx.scale(dpr, dpr);
      }
      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', () => setTimeout(resize, 200));

      // ----- INICIO -----
      async function startSensors() {
        enableBtn.disabled = true;
        enableBtn.textContent = '⏳ Solicitando permiso...';
        const granted = await requestOrientationPermission();
        if (granted) {
          enableSensors();
          calibrate(); // calibración inicial
          overlay.classList.add('hidden');
        } else {
          // fallback a modo ratón o intentar DeviceMotion
          enableBtn.textContent = '⚠️ Sin permiso - Usar ratón';
          useMouseSimulation = true;
          setupMouseSimulation();
          setTimeout(() => overlay.classList.add('hidden'), 800);
        }
      }

      enableBtn.addEventListener('click', startSensors);
      // Permitir tocar el overlay para iniciar también
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay && !enableBtn.disabled) startSensors();
      });

      calibrateBtn.addEventListener('click', calibrate);
      calibrateBtn.addEventListener('touchend', (e) => { e.preventDefault(); calibrate(); });

      // Si es claramente desktop (sin touch, con puntero fino), auto mouse
      function detectDesktop() {
        const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const hasFinePointer = matchMedia('(pointer: fine)').matches;
        if (!hasTouch && hasFinePointer && !hasDeviceOrientation()) {
          useMouseSimulation = true;
          setupMouseSimulation();
          overlay.classList.add('hidden');
        }
      }

      // Inicialización
      resize();
      detectDesktop();
      setupMouseSimulation(); // preparar listener por si acaso, se activa si useMouseSimulation true
      lastTime = performance.now();
      requestAnimationFrame(loop);

      // Si sensores disponibles sin permiso explícito (Android), auto-iniciar
      if (hasDeviceOrientation() && typeof DeviceOrientationEvent.requestPermission !== 'function') {
        // Android: activar sensores directamente, pero mostrar overlay para calibrar
        enableSensors();
        calibrate();
        // Ocultar overlay tras breve pausa
        setTimeout(() => { if (!overlay.classList.contains('hidden')) overlay.classList.add('hidden'); }, 1200);
      }
    })();
  </script>
</body>
</html>
